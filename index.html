<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#87CEEB" />
  <title>신호등 놀이 🚗</title>
  <style>
    :root {
      --sky: #87CEEB;
      --grass: #7CB342;
      --road: #555555;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "Apple SD Gothic Neo", system-ui, sans-serif;
      background: linear-gradient(#87CEEB 0%, #B3E5FC 55%, #AED581 55%, #7CB342 100%);
      touch-action: manipulation;
    }

    body {
      display: flex;
      flex-direction: column;
      padding:
        max(6px, var(--safe-t))
        10px
        max(10px, var(--safe-b))
        10px;
      gap: 8px;
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 4px 0 0;
    }

    h1 {
      font-size: clamp(1.3rem, 5.5vw, 1.8rem);
      color: #1a237e;
      text-shadow: 0 2px 0 rgba(255,255,255,.5);
    }

    .tip {
      font-size: clamp(0.85rem, 3.2vw, 1rem);
      color: #37474f;
      font-weight: 600;
      margin-top: 2px;
    }

    .stage {
      flex: 1;
      min-height: 180px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      background: #87CEEB;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Big kid controls */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .btn-light {
      border: none;
      border-radius: 22px;
      min-height: 88px;
      font-size: clamp(1.1rem, 4.5vw, 1.4rem);
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,.2), 0 8px 16px rgba(0,0,0,.12);
      transition: transform .08s, box-shadow .08s, filter .12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      letter-spacing: 0.02em;
    }

    .btn-light .emoji { font-size: 1.6em; line-height: 1; }
    .btn-light:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,.2), 0 4px 8px rgba(0,0,0,.12);
    }

    .btn-red {
      background: linear-gradient(180deg, #ff6b6b, #e53935);
    }
    .btn-yellow {
      background: linear-gradient(180deg, #ffd54f, #f9a825);
      color: #4e342e;
    }
    .btn-green {
      background: linear-gradient(180deg, #69f0ae, #43a047);
    }

    .btn-light.on {
      filter: brightness(1.08);
      outline: 4px solid #fff;
      outline-offset: 2px;
    }

    .btn-light:not(.on) {
      filter: saturate(0.55) brightness(0.92);
    }

    .extra {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-extra {
      border: none;
      border-radius: 18px;
      min-height: 56px;
      font-size: clamp(1rem, 3.8vw, 1.15rem);
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: #37474f;
      box-shadow: 0 4px 0 rgba(0,0,0,.12);
    }

    .btn-extra:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,.12);
    }

    .btn-extra.active {
      background: #fff9c4;
      color: #f57f17;
      outline: 3px solid #fbc02d;
    }

    .score {
      text-align: center;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-weight: 800;
      color: #1a237e;
      background: rgba(255,255,255,.75);
      border-radius: 999px;
      padding: 8px 14px;
    }

    .score span { color: #e53935; }
  </style>
</head>
<body>
  <header>
    <h1>🚦 신호등 놀이</h1>
    <p class="tip">버튼을 눌러 보세요! 빨강 = 멈춰요 · 초록 = 가요</p>
  </header>

  <div class="stage">
    <canvas id="c"></canvas>
  </div>

  <p class="score">지나간 차 <span id="passed">0</span> 대 · 길에 있는 차 <span id="onroad">0</span> 대</p>

  <div class="controls">
    <button type="button" class="btn-light btn-red" id="btnRed" aria-label="빨간불">
      <span class="emoji">🛑</span>
      빨강
    </button>
    <button type="button" class="btn-light btn-yellow" id="btnYellow" aria-label="노란불">
      <span class="emoji">⚠️</span>
      노랑
    </button>
    <button type="button" class="btn-light btn-green" id="btnGreen" aria-label="초록불">
      <span class="emoji">✅</span>
      초록
    </button>
  </div>

  <div class="extra">
    <button type="button" class="btn-extra" id="btnAuto">🔄 자동 신호</button>
    <button type="button" class="btn-extra" id="btnMore">🚗 차 더 보내기</button>
  </div>

  <script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const stage = canvas.parentElement;

  // Simple one-way street
  let W = 600, H = 320, DPR = 1;
  let ROAD_Y = 160, ROAD_H = 90;
  let STOP_X = 420;
  let LIGHT_X = 470, LIGHT_Y = 70;

  const GREEN_S = 5;
  const YELLOW_S = 2;
  const RED_S = 4;

  const CAR_COLORS = [
    "#e53935", "#1e88e5", "#43a047", "#8e24aa",
    "#fb8c00", "#00acc1", "#fdd835", "#ec407a", "#5c6bc0",
  ];

  let light = "GREEN"; // RED | YELLOW | GREEN
  let auto = false;
  let timer = GREEN_S;
  let cars = [];
  let spawnTimer = 1.2;
  let passed = 0;
  let lastTs = 0;
  let meanGap = 1.6;

  function resize() {
    const rect = stage.getBoundingClientRect();
    W = Math.max(280, rect.width);
    H = Math.max(200, rect.height);
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    ROAD_H = Math.max(70, H * 0.32);
    ROAD_Y = H * 0.42;
    STOP_X = W * 0.68;
    LIGHT_X = W * 0.76;
    LIGHT_Y = H * 0.12;
  }

  function setLight(state) {
    light = state;
    timer = state === "GREEN" ? GREEN_S : state === "YELLOW" ? YELLOW_S : RED_S;
    for (const c of cars) {
      c.decided = false;
      c.stopYellow = false;
    }
    paintBtns();
  }

  function paintBtns() {
    document.getElementById("btnRed").classList.toggle("on", light === "RED");
    document.getElementById("btnYellow").classList.toggle("on", light === "YELLOW");
    document.getElementById("btnGreen").classList.toggle("on", light === "GREEN");
    document.getElementById("btnAuto").classList.toggle("active", auto);
  }

  function spawn(force) {
    // keep gap at left
    for (const c of cars) {
      if (c.x < 70) {
        if (!force) return;
      }
    }
    const maxSpeed = 140 + Math.random() * 70;
    cars.push({
      x: -70,
      y: ROAD_Y + ROAD_H * 0.28 + Math.random() * ROAD_H * 0.15,
      w: 52 + Math.random() * 12,
      h: 26 + Math.random() * 6,
      speed: maxSpeed * 0.55,
      maxSpeed,
      color: CAR_COLORS[(Math.random() * CAR_COLORS.length) | 0],
      decided: false,
      stopYellow: false,
    });
  }

  function updateCar(car, dt, leader) {
    let target = car.maxSpeed;
    const front = car.x + car.w;
    const stopLine = STOP_X - 4;
    const dist = stopLine - front;

    if (leader) {
      const gap = leader.x - front;
      if (gap < 20) target = 0;
      else if (gap < 55) target = Math.min(target, leader.speed * 0.8);
    }

    if (front < STOP_X) {
      if (light === "RED") {
        if (dist < 140) {
          if (dist < 6) target = 0;
          else target = Math.min(target, Math.sqrt(Math.max(0, 2 * 450 * Math.max(0, dist - 2))));
        }
      } else if (light === "YELLOW") {
        if (!car.decided) {
          car.decided = true;
          car.stopYellow = dist > 100 || dist / Math.max(car.speed, 1) > 1;
        }
        if (car.stopYellow) {
          if (dist < 6) target = 0;
          else target = Math.min(target, Math.sqrt(Math.max(0, 2 * 450 * Math.max(0, dist - 2))));
        }
      } else {
        car.decided = false;
        car.stopYellow = false;
      }
    }

    if (car.speed < target) car.speed = Math.min(target, car.speed + 240 * dt);
    else car.speed = Math.max(target, car.speed - 480 * dt);

    if (leader) {
      const maxX = leader.x - 18 - car.w;
      if (car.x + car.speed * dt > maxX) {
        car.x = maxX;
        car.speed = Math.min(car.speed, Math.max(0, leader.speed));
        return;
      }
    }

    const mustStop =
      front < STOP_X &&
      (light === "RED" || (light === "YELLOW" && car.stopYellow));

    if (mustStop && front + car.speed * dt > STOP_X - 2) {
      car.x = STOP_X - 2 - car.w;
      car.speed = 0;
      return;
    }

    car.x += car.speed * dt;
  }

  function update(dt) {
    if (auto) {
      timer -= dt;
      if (timer <= 0) {
        if (light === "GREEN") setLight("YELLOW");
        else if (light === "YELLOW") setLight("RED");
        else setLight("GREEN");
      }
    }

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawn(false);
      spawnTimer = meanGap * (0.6 + Math.random() * 0.8);
    }

    cars.sort((a, b) => a.x - b.x);
    for (let i = cars.length - 1; i >= 0; i--) {
      const leader = i + 1 < cars.length ? cars[i + 1] : null;
      updateCar(cars[i], dt, leader);
    }

    const keep = [];
    for (const c of cars) {
      if (c.x > W + 80) passed++;
      else keep.push(c);
    }
    cars = keep;

    document.getElementById("passed").textContent = String(passed);
    document.getElementById("onroad").textContent = String(cars.length);
  }

  // ── Draw ──────────────────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function drawScene() {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, ROAD_Y);
    sky.addColorStop(0, "#4FC3F7");
    sky.addColorStop(1, "#B3E5FC");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Sun
    ctx.beginPath();
    ctx.fillStyle = "#FFF59D";
    ctx.arc(W * 0.12, H * 0.14, Math.min(W, H) * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.fillStyle = "#FFEE58";
    ctx.arc(W * 0.12, H * 0.14, Math.min(W, H) * 0.045, 0, Math.PI * 2);
    ctx.fill();

    // Clouds
    drawCloud(W * 0.35, H * 0.12, 1);
    drawCloud(W * 0.72, H * 0.18, 0.8);

    // Grass
    ctx.fillStyle = "#8BC34A";
    ctx.fillRect(0, ROAD_Y - 24, W, H);

    // Darker grass bottom
    ctx.fillStyle = "#7CB342";
    ctx.fillRect(0, ROAD_Y + ROAD_H + 10, W, H);

    // Road
    ctx.fillStyle = "#616161";
    ctx.fillRect(0, ROAD_Y, W, ROAD_H);

    // Road edges
    ctx.fillStyle = "#EEEEEE";
    ctx.fillRect(0, ROAD_Y, W, 5);
    ctx.fillRect(0, ROAD_Y + ROAD_H - 5, W, 5);

    // Center dashes
    ctx.fillStyle = "#FFEE58";
    const mid = ROAD_Y + ROAD_H / 2 - 2;
    for (let x = 0; x < W; x += 40) {
      ctx.fillRect(x, mid, 22, 5);
    }

    // Arrow
    ctx.fillStyle = "#BDBDBD";
    const ax = W * 0.18;
    const ay = ROAD_Y + ROAD_H / 2;
    ctx.beginPath();
    ctx.moveTo(ax, ay - 12);
    ctx.lineTo(ax + 36, ay);
    ctx.lineTo(ax, ay + 12);
    ctx.lineTo(ax + 10, ay);
    ctx.closePath();
    ctx.fill();

    // Stop line
    ctx.fillStyle = "#FAFAFA";
    ctx.fillRect(STOP_X, ROAD_Y + 8, 7, ROAD_H - 16);

    // Crosswalk
    ctx.fillStyle = "#E0E0E0";
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(STOP_X + 16 + i * 12, ROAD_Y + 10, 7, ROAD_H - 20);
    }

    // Simple trees
    drawTree(W * 0.08, ROAD_Y - 8, 1);
    drawTree(W * 0.55, ROAD_Y - 6, 0.85);
    drawTree(W * 0.92, ROAD_Y - 10, 1.1);
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath();
    ctx.arc(x, y, 18 * s, 0, Math.PI * 2);
    ctx.arc(x + 20 * s, y - 6 * s, 22 * s, 0, Math.PI * 2);
    ctx.arc(x + 42 * s, y, 16 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawTree(x, y, s) {
    ctx.fillStyle = "#6D4C41";
    ctx.fillRect(x - 5 * s, y - 28 * s, 10 * s, 28 * s);
    ctx.fillStyle = "#43A047";
    ctx.beginPath();
    ctx.arc(x, y - 40 * s, 22 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#66BB6A";
    ctx.beginPath();
    ctx.arc(x - 10 * s, y - 32 * s, 14 * s, 0, Math.PI * 2);
    ctx.arc(x + 12 * s, y - 34 * s, 13 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawLight() {
    const scale = Math.min(W, H) / 420;
    const bw = 36 * scale;
    const bh = 100 * scale;
    const x = LIGHT_X;
    const y = LIGHT_Y;

    // pole
    ctx.fillStyle = "#78909C";
    ctx.fillRect(x + bw / 2 - 4 * scale, y + bh - 4, 8 * scale, ROAD_Y - (y + bh) + 12);

    // housing
    roundRect(x, y, bw, bh, 10 * scale);
    ctx.fillStyle = "#37474F";
    ctx.fill();
    ctx.strokeStyle = "#263238";
    ctx.lineWidth = 2;
    ctx.stroke();

    const lamps = [
      { s: "RED", c: "#e53935", yy: y + bh * 0.22 },
      { s: "YELLOW", c: "#fdd835", yy: y + bh * 0.5 },
      { s: "GREEN", c: "#43a047", yy: y + bh * 0.78 },
    ];
    const cx = x + bw / 2;
    for (const L of lamps) {
      const on = light === L.s;
      const r = bw * 0.28;
      if (on) {
        ctx.beginPath();
        ctx.fillStyle = L.c + "77";
        ctx.arc(cx, L.yy, r * 1.7, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.beginPath();
      ctx.fillStyle = on ? L.c : "#263238";
      ctx.arc(cx, L.yy, r, 0, Math.PI * 2);
      ctx.fill();
      if (on) {
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.arc(cx - r * 0.3, L.yy - r * 0.3, r * 0.28, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Big word next to light
    const word = light === "RED" ? "멈춰!" : light === "YELLOW" ? "조심!" : "가요!";
    const col = light === "RED" ? "#c62828" : light === "YELLOW" ? "#f9a825" : "#2e7d32";
    ctx.font = `bold ${Math.max(18, 28 * scale)}px Segoe UI, Apple SD Gothic Neo, sans-serif`;
    ctx.fillStyle = col;
    ctx.textAlign = "center";
    ctx.fillText(word, x + bw / 2, y + bh + 28 * scale);
    ctx.textAlign = "left";
  }

  function drawCar(car) {
    const x = car.x, y = car.y, w = car.w, h = car.h;
    // shadow
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    roundRect(x + 2, y + h - 4, w, 8, 4);
    ctx.fill();

    // body
    roundRect(x, y, w, h, 8);
    ctx.fillStyle = car.color;
    ctx.fill();

    // roof
    roundRect(x + w * 0.22, y + 2, w * 0.42, h * 0.5, 5);
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fill();

    // windows
    ctx.fillStyle = "#B3E5FC";
    roundRect(x + w * 0.26, y + 5, w * 0.15, h * 0.35, 3);
    ctx.fill();
    roundRect(x + w * 0.45, y + 5, w * 0.15, h * 0.35, 3);
    ctx.fill();

    // wheels
    ctx.fillStyle = "#212121";
    ctx.beginPath();
    ctx.ellipse(x + 12, y + h - 2, 7, 5, 0, 0, Math.PI * 2);
    ctx.ellipse(x + w - 14, y + h - 2, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // headlight
    ctx.fillStyle = "#FFF9C4";
    ctx.beginPath();
    ctx.arc(x + w - 4, y + h * 0.4, 3, 0, Math.PI * 2);
    ctx.fill();

    // smile face on car (cute)
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x + w * 0.72, y + h * 0.62, 4, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
  }

  function draw() {
    drawScene();
    drawLight();
    for (const c of cars) drawCar(c);
  }

  // ── Controls ──────────────────────────────────────────────
  document.getElementById("btnRed").onclick = () => {
    auto = false;
    setLight("RED");
    paintBtns();
  };
  document.getElementById("btnYellow").onclick = () => {
    auto = false;
    setLight("YELLOW");
    paintBtns();
  };
  document.getElementById("btnGreen").onclick = () => {
    auto = false;
    setLight("GREEN");
    paintBtns();
  };
  document.getElementById("btnAuto").onclick = () => {
    auto = !auto;
    if (auto) timer = light === "GREEN" ? GREEN_S : light === "YELLOW" ? YELLOW_S : RED_S;
    paintBtns();
  };
  document.getElementById("btnMore").onclick = () => {
    spawn(true);
    spawn(true);
  };

  // Tap light on canvas
  canvas.addEventListener("pointerdown", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * W;
    const y = ((e.clientY - rect.top) / rect.height) * H;
    const scale = Math.min(W, H) / 420;
    const bw = 36 * scale, bh = 100 * scale;
    if (x >= LIGHT_X - 20 && x <= LIGHT_X + bw + 20 && y >= LIGHT_Y - 10 && y <= LIGHT_Y + bh + 20) {
      auto = false;
      if (light === "GREEN") setLight("YELLOW");
      else if (light === "YELLOW") setLight("RED");
      else setLight("GREEN");
      paintBtns();
    }
  });

  function frame(ts) {
    if (!lastTs) lastTs = ts;
    let dt = (ts - lastTs) / 1000;
    lastTs = ts;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  resize();
  paintBtns();
  // start with a few cars
  spawn(true);
  spawnTimer = 0.8;

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", () => setTimeout(resize, 200));
  if (window.ResizeObserver) new ResizeObserver(resize).observe(stage);

  requestAnimationFrame(frame);
})();
  </script>
</body>
</html>
